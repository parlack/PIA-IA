; PIA-IA · supervisord: corre Nginx + uvicorn (FastAPI) + node (Nuxt) en un solo contenedor.
; Si cualquier proceso muere, supervisord lo reinicia.

[supervisord]
nodaemon  = true
logfile   = /var/log/supervisord.log
loglevel  = info
user      = root

; -------- API FastAPI --------
[program:api]
command  = /usr/local/bin/uvicorn main:app
           --host=%(ENV_UVICORN_HOST)s
           --port=%(ENV_UVICORN_PORT)s
           --proxy-headers
           --forwarded-allow-ips=*
directory = /app/backend
autostart = true
autorestart = true
priority   = 10
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes = 0
environment = PYTHONPATH="/app/backend"

; -------- Web Nuxt SSR --------
[program:web]
command  = /usr/bin/node /app/frontend/.output/server/index.mjs
directory = /app
autostart = true
autorestart = true
priority   = 20
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes = 0
environment =
    NODE_ENV="production",
    HOST="%(ENV_NUXT_HOST)s",
    PORT="%(ENV_NUXT_PORT)s",
    NUXT_PUBLIC_API_BASE="/api"

; -------- Nginx reverse proxy --------
[program:nginx]
command  = /usr/sbin/nginx -g "daemon off;"
autostart = true
autorestart = true
priority   = 30
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes = 0
