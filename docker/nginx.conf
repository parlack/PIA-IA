# PIA-IA · Nginx reverse proxy interno del contenedor.
# /api/*  -> FastAPI (uvicorn :8000) con strip del prefijo /api
# /*      -> Nuxt SSR (node    :3000)

worker_processes  auto;
error_log         /var/log/nginx/error.log warn;
pid               /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include            /etc/nginx/mime.types;
    default_type       application/octet-stream;
    sendfile           on;
    keepalive_timeout  65;
    server_tokens      off;

    # Logging conciso (sin IP final para no llenar disco)
    log_format  piaia  '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" upstream=$upstream_addr';
    access_log         /var/log/nginx/access.log piaia;

    client_max_body_size 25m;

    # Compresion basica (Nuxt ya manda activos hasheados)
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    upstream piaia_api {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    upstream piaia_web {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    server {
        listen        8080 default_server;
        listen        [::]:8080 default_server;
        server_name   _;

        # ------ API (strip /api del path antes de pasar a uvicorn) ------
        location /api/ {
            proxy_http_version          1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout         60s;
            proxy_send_timeout         60s;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://piaia_api;
        }

        # ------ Documentacion OpenAPI directa ------
        location /docs    { proxy_pass http://piaia_api; }
        location /redoc   { proxy_pass http://piaia_api; }
        location /openapi.json { proxy_pass http://piaia_api; }

        # ------ Web (Nuxt SSR, raiz) ------
        location / {
            proxy_http_version          1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade          $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout         60s;
            proxy_send_timeout         60s;
            proxy_pass http://piaia_web;
        }
    }
}
